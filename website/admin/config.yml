backend:
  name: git-gateway
  branch: main

media_folder: "website/assets/images"
public_folder: "/assets/images"

collections:
  - name: "tutorial"
    label: "教程章节"
    folder: "website/content"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "标题", name: "title", widget: "string"}
      - {label: "描述", name: "description", widget: "string"}
      - {label: "排序", name: "order", widget: "number", default: 1}
      - {label: "正文内容", name: "body", widget: "markdown"}
      - {label: "标签", name: "tags", widget: "list", default: []}

  - name: "settings"
    label: "网站设置"
    files:
      - name: "general"
        label: "通用设置"
        file: "website/content/settings.md"
        fields:
          - {label: "网站标题", name: "site_title", widget: "string"}
          - {label: "网站描述", name: "site_description", widget: "string"}
          - {label: "作者", name: "author", widget: "string"}
