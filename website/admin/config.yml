backend:
  name: git-gateway
  branch: main

media_folder: "website/assets/images"
public_folder: "/assets/images"

site_url: https://vibe-coding-plan.netlify.app
display_url: https://vibe-coding-plan.netlify.app

publish_mode: editorial_workflow
show_preview_links: true

collections:
  - name: "tutorial"
    label: "教程章节"
    label_singular: "章节"
    folder: "website/content"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "标题", name: "title", widget: "string", required: true}
      - {label: "描述", name: "description", widget: "string", required: false}
      - {label: "排序", name: "order", widget: "number", default: 1, required: false}
      - {label: "正文内容", name: "body", widget: "markdown", required: true}
      - {label: "标签", name: "tags", widget: "list", default: [], required: false}
      - {label: "状态", name: "draft", widget: "boolean", default: false, required: false}

  - name: "settings"
    label: "网站设置"
    files:
      - name: "general"
        label: "通用设置"
        file: "website/content/settings.md"
        fields:
          - {label: "网站标题", name: "site_title", widget: "string", required: true}
          - {label: "网站描述", name: "site_description", widget: "string", required: false}
          - {label: "作者", name: "author", widget: "string", required: false}
