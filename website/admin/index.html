<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager | Vibe Coding Tutorial</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: #00f5ff;
      font-size: 18px;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="loading">正在加载 CMS...</div>

  <!-- Include the script that builds the page and powers Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // 移除加载提示
    function hideLoading() {
      const loading = document.getElementById('loading');
      if (loading) loading.remove();
    }

    // 初始化 Netlify Identity
    if (window.netlifyIdentity) {
      const identity = window.netlifyIdentity;

      // 监听初始化事件
      identity.on('init', (user) => {
        console.log('Identity initialized:', user);

        if (!user) {
          // 未登录，打开登录窗口
          console.log('No user found, opening login...');
          identity.open();

          // 监听登录成功
          identity.on('login', (loggedInUser) => {
            console.log('User logged in:', loggedInUser);
            hideLoading();
            window.location.reload();
          });

          // 监听关闭
          identity.on('close', () => {
            if (!identity.currentUser()) {
              console.log('Login dialog closed without login');
              // 显示提示
              document.body.innerHTML = `
                <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a0f;color:#fff;text-align:center;">
                  <div>
                    <h2>需要登录才能访问 CMS</h2>
                    <p>请检查你的邮箱，找到邀请邮件并点击其中的链接。</p>
                    <p>或者<a href="/" style="color:#00f5ff;">返回首页</a></p>
                  </div>
                </div>
              `;
            }
          });
        } else {
          // 已登录
          console.log('User already logged in:', user);
          hideLoading();
        }
      });

      // 处理登录事件
      identity.on('login', (user) => {
        console.log('Login event:', user);
        setTimeout(() => {
          window.location.reload();
        }, 1000);
      });

      // 处理登出事件
      identity.on('logout', () => {
        console.log('User logged out');
        window.location.reload();
      });
    } else {
      // Identity widget 未加载
      console.error('Netlify Identity widget not loaded');
      document.body.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a0f;color:#fff;text-align:center;padding:20px;">
          <div>
            <h2>⚠️ Netlify Identity 未加载</h2>
            <p>请确保你的网站部署在 Netlify 上。</p>
            <p>如果你是开发者，请检查 Netlify Identity 是否已启用。</p>
            <p style="margin-top:20px;"><a href="/" style="color:#00f5ff;">返回首页</a></p>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
