# Netlify 配置文件

[build]
  publish = "website"
  command = ""

# 重定向规则
# 1. 静态资源不重定向
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/css/*"
  to = "/css/:splat"
  status = 200

[[redirects]]
  from = "/js/*"
  to = "/js/:splat"
  status = 200

[[redirects]]
  from = "/pages/*"
  to = "/pages/:splat"
  status = 200

# 2. Admin 路由
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# 3. 身份验证页面
[[redirects]]
  from = "/identity.html"
  to = "/admin/identity.html"
  status = 200

# 4. 所有其他路由重定向到 index.html（SPA 支持）
# 但不影响现有文件
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
